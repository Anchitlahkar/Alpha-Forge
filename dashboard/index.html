<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Intelligence Dashboard</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --border: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        h1, h2, h3 { color: var(--primary); }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .meta {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .score {
            display: inline-block;
            background: var(--primary);
            color: var(--bg);
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.8em;
        }
        ul { margin: 10px 0; padding-left: 20px; }
        a { color: var(--primary); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Intelligence Brief</h1>
            <p>Generated on 2026-06-19</p>
            <div class="nav">
                <a href="#top">Top Insights</a>
                <a href="#categories">Categories</a>
                <a href="#weekly">Weekly Deep Dive</a>
            </div>
        </header>

        <section id="top">
            <h2>Today's Top Insights</h2>
            
        </section>

        <section id="categories">
            <h2>By Category</h2>
            
        </section>

        <section id="weekly">
            <h2>Weekly Deep Dive</h2>
            <div class="card">
                
                    <p>No weekly synthesis available yet.</p>
                
            </div>
        </section>
    </div>
</body>
</html>
