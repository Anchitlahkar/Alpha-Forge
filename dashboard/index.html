<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0F19;
            --surface: #151B2C;
            --surface-hover: #1E2640;
            --primary: #6366F1;
            --primary-light: #8B5CF6;
            --text: #F3F4F6;
            --text-muted: #9CA3AF;
            --border: #222E4A;
            --accent: #10B981;
        }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 30px;
            margin-bottom: 40px;
            text-align: center;
        }
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #6366F1, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 1.8em;
            color: var(--text);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
            margin-top: 40px;
            margin-bottom: 20px;
        }
        .nav {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .nav a {
            color: var(--text-muted);
            font-weight: 500;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }
        .nav a:hover {
            color: var(--text);
            border-color: var(--primary);
            background: var(--surface-hover);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-title {
            font-size: 1.5em;
            font-weight: 600;
            margin: 0;
            color: #FFFFFF;
            flex: 1;
            min-width: 250px;
        }
        .badges {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .badge {
            font-size: 0.8em;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-category {
            background: rgba(99, 102, 241, 0.15);
            color: #A5B4FC;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .badge-score {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #FFFFFF;
        }
        .meta-line {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }
        .meta-line span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .section-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #E5E7EB;
            margin-top: 20px;
            margin-bottom: 8px;
        }
        .why-it-matters {
            background: rgba(16, 185, 129, 0.08);
            border-left: 4px solid var(--accent);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-style: italic;
        }
        .tldr {
            font-size: 1.05em;
            color: #D1D5DB;
            margin-bottom: 20px;
        }
        ul {
            margin: 0 0 20px 0;
            padding-left: 20px;
        }
        li {
            margin-bottom: 6px;
            color: #D1D5DB;
        }
        .card-footer {
            border-top: 1px solid var(--border);
            padding-top: 20px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #FFFFFF;
            background: var(--primary);
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s ease;
        }
        .btn-link:hover {
            background: #4F46E5;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Intelligence Brief</h1>
            <p style="color: var(--text-muted); font-size: 1.1em; margin: 5px 0 0 0;">Generated on 2026-07-05</p>
            <div class="nav">
                <a href="#top">Top Insights</a>
                <a href="#categories">Categories</a>
                <a href="#weekly">Weekly Deep Dive</a>
            </div>
        </header>

        <section id="top">
            <h2>Today's Top Insights</h2>
            
            
            <p style="color: var(--text-muted); font-style: italic;">No insights available for today.</p>
            
        </section>

        <section id="categories">
            <h2>By Category</h2>
            
            
            <p style="color: var(--text-muted); font-style: italic;">No categorized insights available.</p>
            
        </section>

        <section id="weekly">
            <h2>Weekly Deep Dive</h2>
            <div class="card">
                
                    <p style="color: var(--text-muted); font-style: italic; margin: 0;">No weekly synthesis available yet.</p>
                
            </div>
        </section>
    </div>
</body>
</html>
