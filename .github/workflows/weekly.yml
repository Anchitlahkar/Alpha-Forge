name: Weekly Synthesis Run

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 0' # Run at 9:00 AM UTC every Sunday
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Weekly Synthesis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python src/main.py --weekly

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ dashboard/
          git diff-index --quiet HEAD || (git commit -m "chore: Update weekly synthesis" && git push)
